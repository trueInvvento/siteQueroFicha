<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificação de Email - QueroFicha</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --primary: #007aff;
        --primary-hover: #0062cc;
        --success: #059669;
        --error: #dc2626;
        --border: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px 28px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .logo {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 16px;
      }

      .spinner {
        width: 40px;
        height: 40px;
        margin: 24px auto;
        border: 3px solid #dbeafe;
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .status-success {
        color: var(--success);
        font-weight: 600;
      }

      .status-error {
        color: var(--error);
        font-weight: 600;
      }

      .actions {
        display: none;
        margin-top: 28px;
        gap: 12px;
      }

      .actions.visible {
        display: grid;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 48px;
        padding: 12px 16px;
        border-radius: 12px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .button-primary {
        background: var(--primary);
        color: #ffffff;
      }

      .button-primary:hover {
        background: var(--primary-hover);
      }

      .button-secondary {
        background: #f1f5f9;
        color: var(--text);
      }

      .button-secondary:hover {
        background: #e2e8f0;
      }

      .hint {
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">QueroFicha</div>
      <h1 id="title">Verificação de Email</h1>
      <p id="message">Verificando seu email...</p>
      <div class="spinner" id="spinner" aria-hidden="true"></div>

      <div class="actions" id="actions">
        <a class="button button-primary" id="open-app" href="#">Abrir App</a>
        <a class="button button-secondary" id="go-home" href="https://queroficha.com.br">
          Ir para o Site
        </a>
      </div>

      <p class="hint" id="hint"></p>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script>
      (function () {
        var firebaseConfig = {
          apiKey: 'AIzaSyDeJJxqL_r27vnl9HPNsfi7jM-9fQfhxLE',
          authDomain: 'queroficha-17d10.firebaseapp.com',
          projectId: 'queroficha-17d10',
          storageBucket: 'queroficha-17d10.firebasestorage.app',
          messagingSenderId: '66924265676',
          appId: '1:66924265676:web:f8f7021b200b805aa44269',
        };

        var titleEl = document.getElementById('title');
        var messageEl = document.getElementById('message');
        var spinnerEl = document.getElementById('spinner');
        var actionsEl = document.getElementById('actions');
        var openAppEl = document.getElementById('open-app');
        var hintEl = document.getElementById('hint');

        function getActionParams() {
          var searchParams = new URLSearchParams(window.location.search);
          var hash = window.location.hash.replace(/^#/, '');
          var hashParams = new URLSearchParams(hash);

          function pick(key) {
            return searchParams.get(key) || hashParams.get(key);
          }

          return {
            mode: pick('mode'),
            oobCode: pick('oobCode'),
            apiKey: pick('apiKey'),
            continueUrl: pick('continueUrl'),
            lang: pick('lang') || 'pt',
          };
        }

        function buildAppDeepLink(params) {
          var query = new URLSearchParams();
          if (params.oobCode) query.set('oobCode', params.oobCode);
          if (params.mode) query.set('mode', params.mode);
          return 'queroficha://verify-otp?' + query.toString();
        }

        function showActions(appLink) {
          openAppEl.href = appLink;
          actionsEl.classList.add('visible');
        }

        function showSuccess(text) {
          spinnerEl.style.display = 'none';
          titleEl.textContent = 'Email verificado!';
          messageEl.innerHTML =
            '<span class="status-success">' + text + '</span>';
          showActions(buildAppDeepLink(getActionParams()));
          hintEl.textContent =
            'Abra o app QueroFicha para continuar usando sua conta.';
        }

        function showError(text) {
          spinnerEl.style.display = 'none';
          titleEl.textContent = 'Não foi possível verificar';
          messageEl.innerHTML =
            '<span class="status-error">' + text + '</span>';
          showActions('queroficha://');
          hintEl.textContent =
            'Se o link expirou, solicite um novo email de verificação no app.';
        }

        function tryOpenApp(appLink) {
          var openedAt = Date.now();
          window.location.href = appLink;

          window.setTimeout(function () {
            if (Date.now() - openedAt < 1600) {
              showActions(appLink);
              hintEl.textContent =
                'Se o app não abriu automaticamente, toque em "Abrir App".';
            }
          }, 1200);
        }

        function hasValidFirebaseConfig() {
          return (
            firebaseConfig.apiKey &&
            firebaseConfig.apiKey.indexOf('{{') === -1 &&
            firebaseConfig.projectId &&
            firebaseConfig.projectId.indexOf('{{') === -1
          );
        }

        function applyVerificationOnWeb(oobCode) {
          if (!hasValidFirebaseConfig()) {
            return Promise.reject(new Error('Firebase config missing'));
          }

          if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
          }

          return firebase.auth().applyActionCode(oobCode);
        }

        var params = getActionParams();

        if (params.mode !== 'verifyEmail' || !params.oobCode) {
          showError('Link inválido ou incompleto.');
          return;
        }

        var appLink = buildAppDeepLink(params);

        if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
          tryOpenApp(appLink);
        } else {
          spinnerEl.style.display = 'none';
          messageEl.textContent =
            'Abra o app QueroFicha no seu celular para concluir a verificação.';
          showActions(appLink);
          hintEl.textContent =
            'Você também pode tentar verificar neste navegador se estiver logado com a mesma conta.';
        }

        applyVerificationOnWeb(params.oobCode)
          .then(function () {
            showSuccess('Seu email foi verificado com sucesso.');
          })
          .catch(function (error) {
            var code = error && error.code ? error.code : '';
            if (code === 'auth/invalid-action-code') {
              showError('Link inválido ou expirado.');
              return;
            }
            if (code === 'auth/expired-action-code') {
              showError('Este link expirou. Solicite um novo email no app.');
              return;
            }
            if (code === 'Firebase config missing') {
              return;
            }
            if (!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
              showError(
                'Não foi possível verificar neste navegador. Use o app no celular.',
              );
            }
          });
      })();
    </script>
  </body>
</html>
